name: Flutter

on:
  push:
    branches: [main]
    paths:
      - 'src/app/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/app/**'
      - '.github/workflows/flutter.yml'

jobs:
  frontend:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('src/app/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test
        run: flutter test
