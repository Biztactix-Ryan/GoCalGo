name: gocalgo
description: Pokemon Go Events Calendar - daily view of active buffs and bonuses.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.3.0
  intl: ^0.20.2
  sqflite: ^2.4.1
  path: ^1.9.0
  connectivity_plus: ^6.1.0
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  flutter_native_splash: ^2.4.4
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.4+4
  test: ^1.30.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_foreground: "assets/icons/app_icon_adaptive_foreground.png"
  adaptive_icon_background: "assets/icons/app_icon_adaptive_background.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

flutter_native_splash:
  color: "#F5F7FA"
  image: "assets/icons/app_icon.png"
  android_12:
    color: "#F5F7FA"
    icon_background_color: "#F5F7FA"
    image: "assets/icons/app_icon_adaptive_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
